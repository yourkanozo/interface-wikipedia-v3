<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>INTERFACE WIKIPEDIA</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700;800&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#02040d;--txt:#fef7f2;--red:#e60020;--blue:#00a0e9;
  --dim:rgba(254,247,242,0.08);--dim2:rgba(254,247,242,0.04);--dim3:rgba(254,247,242,0.18);
}
html{scroll-behavior:smooth;}
body{
  background-color:var(--bg);
  background-image:linear-gradient(to bottom,
    var(--blue) 8%,
    var(--red) 20%,
    var(--bg) 42%,
    var(--bg) 100%);
  background-repeat:no-repeat;
  background-size:100% 100vh;
  background-position:0 0;
  color:var(--txt);font-family:'JetBrains Mono',monospace;overflow-x:hidden;min-height:100vh;
}

/* 각 페이지 컨테이너는 자체 배경 없이 body의 그라데이션이 투과되도록 */
#home,#verb-page,#detail-page{background:transparent;}

/* ===== INTRO: 클릭할수록 검정에서 빨강으로. 동작이 쌓여 색이 된다 ===== */
#intro{position:fixed;inset:0;z-index:1000;background:var(--bg);
  display:flex;align-items:center;justify-content:center;flex-direction:column;
  cursor:pointer;user-select:none;}
#intro-dot{width:14px;height:14px;border-radius:50%;background:var(--txt);
  box-shadow:0 0 0 1px rgba(254,247,242,0.3);transition:transform 0.15s,box-shadow 0.3s;}
#intro.pressed #intro-dot{transform:scale(0.7);}
#intro-hint{margin-top:22px;font-size:10px;letter-spacing:0.25em;color:rgba(254,247,242,0.35);
  font-family:'JetBrains Mono',monospace;transition:opacity 0.3s;}
#intro-count{position:absolute;bottom:36px;font-size:9px;letter-spacing:0.1em;
  color:rgba(254,247,242,0.25);font-family:'JetBrains Mono',monospace;}
#intro.firing{pointer-events:none;}
@keyframes intro-flash{0%{transform:scale(1);}50%{transform:scale(40);}100%{transform:scale(80);opacity:0;}}
#intro.firing #intro-dot{animation:intro-flash 0.6s cubic-bezier(.4,0,.2,1) forwards;background:var(--red);}


nav{position:fixed;top:0;left:0;right:0;z-index:200;display:flex;align-items:center;justify-content:space-between;
  padding:28px 44px;background:linear-gradient(rgba(2,4,13,0.95),rgba(2,4,13,0.7) 70%,transparent);
  border-bottom:1px solid rgba(230,0,32,0.15);}
.nav-logo{font-size:11px;font-weight:800;letter-spacing:0.1em;color:var(--txt);text-decoration:none;cursor:pointer;}
.nav-logo span{color:var(--red);}
.nav-hint{font-size:9px;color:var(--dim3);letter-spacing:0.06em;}

/* ===== HOME: 동사 대표 이미지가 가운데 가로로, 클릭 시 아래로 펼침 ===== */
#home{width:100%;min-height:100vh;display:flex;flex-direction:row;flex-wrap:nowrap;
  align-items:flex-start;justify-content:center;
  gap:36px;padding:140px 60px 100px;overflow-x:auto;}
#home::-webkit-scrollbar{height:0;}

.verb-block{display:flex;flex-direction:column;align-items:center;flex-shrink:0;
  opacity:0;transition:opacity 0.5s ease;}
.verb-block.revealed{opacity:1;}

/* 대표 이미지: 텍스트 없이 사진만 */
.verb-header{position:relative;width:108px;height:108px;overflow:hidden;cursor:pointer;
  transition:opacity 0.25s,transform 0.3s;flex-shrink:0;}
.verb-header:hover{opacity:0.85;}
.verb-header img{width:100%;height:100%;object-fit:cover;display:block;
  transition:transform 0.4s;}
.verb-header:hover img{transform:scale(1.06);}
.verb-header::after{content:'';position:absolute;inset:0;border:1px solid var(--red);opacity:0;
  transition:opacity 0.2s;pointer-events:none;}
.verb-header:hover::after{opacity:1;}

/* 클릭 시 대표 이미지 아래로 두 줄 그리드가 펼쳐짐 */
.verb-thumbs{width:108px;max-height:0;margin-top:0;overflow:hidden;
  display:grid;grid-template-columns:repeat(2,46.5px);grid-auto-rows:46.5px;gap:15px;
  align-content:start;justify-content:start;
  transition:max-height 0.4s ease,margin-top 0.4s ease;}
.verb-block.expanded .verb-thumbs{max-height:2000px;margin-top:22px;overflow-y:auto;}
.verb-thumbs::-webkit-scrollbar{display:none;}
.thumb-item{position:relative;width:46.5px;height:46.5px;overflow:hidden;cursor:pointer;
  transition:opacity 0.15s,box-shadow 0.2s;}
.thumb-item:hover{opacity:0.85;box-shadow:0 0 0 1px var(--red);}
.thumb-item img{width:100%;height:100%;object-fit:cover;display:block;}
.thumb-fallback{width:100%;height:100%;display:flex;align-items:center;justify-content:center;
  background:rgba(230,0,32,0.06);font-size:5px;color:var(--dim3);text-align:center;padding:2px;line-height:1.2;}

/* ===== 클릭 모션: 단일, 사라지지 않음 ===== */
@keyframes m-press{0%{transform:scale(1);}35%{transform:scale(0.93);}100%{transform:scale(1.04);}}
.motion-active{animation:m-press 0.35s cubic-bezier(.3,.7,.4,1) forwards;}
[class*="motion-"]{position:relative;z-index:50;}

/* 호버: 동작이 일어나기 직전의 미세한 긴장(떨림) */
@keyframes tremble{
  0%,100%{transform:translate(0,0) rotate(0deg);}
  25%{transform:translate(-0.4px,0.2px) rotate(-0.12deg);}
  50%{transform:translate(0.3px,-0.2px) rotate(0.1deg);}
  75%{transform:translate(-0.2px,0.3px) rotate(-0.08deg);}
}
.tremble-hover img{transition:filter 0.2s;}
.tremble-hover:hover img{animation:tremble 0.4s ease-in-out infinite;}

@keyframes page-in{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
.page-enter{animation:page-in 0.4s cubic-bezier(.2,.7,.3,1) forwards;}

/* 동사 페이지/상세 페이지로 넘어갈 때 화면을 빨강으로 한 번 와이프 */
#red-wipe{position:fixed;inset:0;z-index:500;background:var(--red);
  transform:scaleY(0);transform-origin:bottom;pointer-events:none;}
@keyframes wipe-in{0%{transform:scaleY(0);transform-origin:bottom;}45%{transform:scaleY(1);transform-origin:bottom;}
  55%{transform:scaleY(1);transform-origin:top;}100%{transform:scaleY(0);transform-origin:top;}}
#red-wipe.firing{animation:wipe-in 0.5s cubic-bezier(.6,0,.4,1) forwards;}

/* ===== VERB PAGE ===== */
#verb-page{display:none;min-height:100vh;padding:72px 0 80px;}
#verb-page.open{display:block;}
.vp-header{padding:0 44px 36px;border-bottom:1px solid rgba(230,0,32,0.2);}
.vp-title{font-size:clamp(44px,8vw,96px);font-weight:800;line-height:0.9;letter-spacing:-0.02em;color:var(--bg);}
.vp-title span{color:var(--bg);}
.vp-meta{margin-top:10px;font-size:10px;color:var(--bg);letter-spacing:0.06em;}

.vp-grid{padding:32px 44px 60px;display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:20px;}
.vp-card{position:relative;overflow:hidden;cursor:pointer;aspect-ratio:1/1;
  background:rgba(230,0,32,0.05);box-shadow:0 0 0 1px rgba(230,0,32,0.1);
  transition:box-shadow 0.2s;}
.vp-card:hover{box-shadow:0 0 0 1px var(--red);}
.vp-card img{width:100%;height:100%;object-fit:cover;display:block;}
.vp-card .vc-name{position:absolute;bottom:0;left:0;right:0;padding:24px 8px 8px;
  background:linear-gradient(transparent,rgba(26,7,3,0.94));font-size:10px;font-weight:700;color:var(--bg);
  line-height:1.3;transform:translateY(100%);transition:transform 0.2s;}
.vp-card:hover .vc-name{transform:translateY(0);}
.vp-card .vc-id{position:absolute;top:6px;left:6px;font-size:7px;color:var(--bg);}
.vp-card-fallback{width:100%;height:100%;display:flex;align-items:center;justify-content:center;
  background:rgba(230,0,32,0.06);font-size:10px;color:rgba(254,247,242,0.5);text-align:center;padding:10px;
  line-height:1.4;font-weight:700;}

/* ===== DETAIL PAGE ===== */
#detail-page{display:none;min-height:100vh;padding:72px 0;}
#detail-page.open{display:block;}
.dp-wrap{max-width:100%;padding:0 32px;display:grid;grid-template-columns:1fr 1fr;gap:0;min-height:72vh;}
.dp-img-side{position:relative;overflow:hidden;background:rgba(230,0,32,0.05);
  box-shadow:0 0 0 1px rgba(230,0,32,0.15);}
.dp-img-side img{width:100%;height:100%;object-fit:cover;display:block;}
.dp-img-fallback{width:100%;height:100%;min-height:360px;display:flex;align-items:center;justify-content:center;
  font-size:13px;color:var(--dim3);}
.dp-info-side{padding:40px 40px 40px 56px;display:flex;flex-direction:column;justify-content:space-between;
  border-left:1px solid rgba(230,0,32,0.2);}
.dp-num{font-size:10px;color:var(--bg);letter-spacing:0.1em;margin-bottom:14px;}
.dp-name{font-size:clamp(22px,3.2vw,42px);font-weight:800;line-height:1.12;color:var(--bg);
  letter-spacing:-0.01em;margin-bottom:32px;}
.dp-tags{display:flex;flex-direction:column;gap:14px;}
.dp-tag-row{display:flex;align-items:flex-start;gap:14px;}
.dp-tag-key{font-size:9px;color:var(--bg);letter-spacing:0.1em;width:54px;flex-shrink:0;padding-top:4px;}
.dp-tag-vals{display:flex;flex-wrap:wrap;gap:6px;}
.dp-tag-val{font-size:11px;padding:4px 10px;border:1px solid rgba(230,0,32,0.25);color:var(--bg);
  letter-spacing:0.02em;background:rgba(230,0,32,0.04);cursor:default;font-family:inherit;}
.dp-tag-val.action{border-color:var(--red);color:var(--bg);background:rgba(230,0,32,0.1);cursor:pointer;
  transition:background 0.15s,color 0.15s;}
.dp-tag-val.action:hover{background:var(--red);color:var(--bg);}

.dp-lookup{margin-top:32px;display:inline-flex;align-items:center;gap:8px;font-size:11px;letter-spacing:0.1em;
  color:var(--bg);text-decoration:none;transition:color 0.2s;}
.dp-lookup:hover{color:var(--bg);}
.dp-lookup::after{content:'↗';}

.dp-related{padding:0 32px;border-top:1px solid rgba(230,0,32,0.2);}
.dp-rel-label{padding:20px 0 14px;font-size:9px;color:var(--bg);letter-spacing:0.1em;}
.dp-rel-scroll{display:flex;gap:2px;overflow-x:auto;padding-bottom:2px;scrollbar-width:none;}
.dp-rel-scroll::-webkit-scrollbar{display:none;}
.dp-rel-item{flex:0 0 100px;height:100px;position:relative;overflow:hidden;cursor:pointer;
  box-shadow:0 0 0 1px rgba(230,0,32,0.1);transition:box-shadow 0.2s;}
.dp-rel-item:hover{box-shadow:0 0 0 1px var(--red);}
.dp-rel-item img{width:100%;height:100%;object-fit:cover;display:block;}
.dp-rel-item .dri-name{position:absolute;bottom:0;left:0;right:0;padding:14px 5px 5px;
  background:linear-gradient(transparent,rgba(26,7,3,0.92));font-size:7px;color:var(--bg);line-height:1.25;
  transform:translateY(100%);transition:transform 0.2s;}
.dp-rel-item:hover .dri-name{transform:translateY(0);}

.back-btn{position:fixed;bottom:32px;right:32px;z-index:300;width:44px;height:44px;border-radius:50%;
  border:1px solid rgba(230,0,32,0.3);background:var(--bg);color:var(--txt);font-size:16px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:border-color 0.2s,background 0.15s;
  font-family:'JetBrains Mono',monospace;box-shadow:0 0 20px rgba(230,0,32,0.15);}
.back-btn:hover{border-color:var(--red);background:rgba(230,0,32,0.1);}
.back-btn.hidden{display:none;}

.breadcrumb{position:fixed;bottom:32px;left:32px;z-index:300;font-size:9px;color:var(--bg);letter-spacing:0.05em;}
.breadcrumb span{color:var(--bg);}

@media(max-width:768px){
  .vp-grid{grid-template-columns:repeat(2,1fr);}
  .dp-wrap{grid-template-columns:1fr;}
  .dp-info-side{padding:24px;}
  nav{padding:20px 24px;}
  .vp-header{padding:0 16px 24px;}
  .vp-grid{padding:16px;}
  .dp-related{padding:0 16px;}
  .verb-header{width:80px;height:80px;}
  .verb-thumbs{width:80px;grid-template-columns:repeat(2,32.5px);grid-auto-rows:32.5px;}
  .thumb-item{width:32.5px;height:32.5px;}
  #home{gap:20px;padding:110px 24px 60px;}
}
</style>
</head>

    else{imgEl.onerror=null;imgEl.src=`https://loremflickr.com/300/300/${tag||'object'}?lock=${id}`;}
  };
  imgEl.src=`${GH_BASE}/${pad4(id)}.${EXTS[0]}`;
}
function mkImg(id,tag,cls){
  const img=document.createElement('img');img.className=cls||'';img.alt='';img.loading='lazy';
  setupImg(img,id,tag);return img;
}

const VERB_ORDER = ["꽂다", "누르다", "돌리다", "당기다", "쥐다", "닿다", "올리다", "밀다", "붙이다"];
const VERB_EN = {"꽂다": "INSERT", "누르다": "PRESS", "돌리다": "TURN", "당기다": "PULL", "쥐다": "GRIP", "닿다": "TOUCH", "올리다": "LIFT", "밀다": "PUSH", "붙이다": "ATTACH"};
const VERB_REPR = {"꽂다": 28, "누르다": 29, "돌리다": 65, "당기다": 24, "쥐다": 38, "닿다": 4, "올리다": 31, "밀다": 52, "붙이다": 13};

function getVerbItems(verb){return ITEMS.filter(it=>it.actions.includes(verb));}

// 클릭 시 짧게 눌렸다가 돌아오는 단일 피드백을 준 뒤 콜백 실행.
function playMotion(el, verb, callback){
  el.classList.add('motion-active');
  let done = false;
  const finish = () => {
    if (done) return;
    done = true;
    el.classList.remove('motion-active');
    callback();
  };
  el.addEventListener('animationend', finish, { once: true });
  setTimeout(finish, 380);
}

let history=[{page:'home'}];

let expandedVerbs = new Set();

function renderHome(){
  const home=document.getElementById('home');
  home.innerHTML='';
  VERB_ORDER.forEach(verb=>{
    const items=getVerbItems(verb);
    if(!items.length)return;
    const reprId=VERB_REPR[verb];
    const reprItem=ITEMS.find(i=>i.id===reprId)||items[0];

    const block=document.createElement('div');
    block.className='verb-block'+(expandedVerbs.has(verb)?' expanded':'');

    const header=document.createElement('div');header.className='verb-header tremble-hover';
    const himg=mkImg(reprItem.id,reprItem.tag);
    header.append(himg);
    header.onclick=()=>{
      playMotion(header, verb, ()=>{
        if(expandedVerbs.has(verb)) expandedVerbs.delete(verb);
        else expandedVerbs.add(verb);
        block.classList.toggle('expanded');
      });
    };

    const thumbs=document.createElement('div');thumbs.className='verb-thumbs';
    items.forEach(it=>{
      const ti=document.createElement('div');ti.className='thumb-item tremble-hover';
      const timg=mkImg(it.id,it.tag);
      const tfb=document.createElement('div');tfb.className='thumb-fallback';tfb.textContent=it.name;tfb.style.display='none';
      timg.onerror=()=>{timg.style.display='none';tfb.style.display='flex';};
      ti.append(timg,tfb);
      ti.onclick=()=>playMotion(ti, it.actions[0]||verb, ()=>openVerbPage(verb));
      thumbs.appendChild(ti);
    });

    block.append(header,thumbs);
    home.appendChild(block);
  });

  // 스크롤하며 화면에 들어온 동사 블록만 보임 (처음엔 1~2개만, 나머진 스크롤해야 등장)
  const observer = new IntersectionObserver((entries)=>{
    entries.forEach(e=>{ if(e.isIntersecting) e.target.classList.add('revealed'); });
  }, { root: home, threshold: 0.15 });
  home.querySelectorAll('.verb-block').forEach(b=>observer.observe(b));
}

function openVerbPage(verb,fromDetail){
  if(!fromDetail) history.push({page:'verb',verb});
  const items=getVerbItems(verb);
  document.getElementById('vp-title').innerHTML=`${verb}<span style="color:var(--red)">.</span>`;
  document.getElementById('vp-meta').textContent=`${items.length} interfaces · ${VERB_EN[verb]}`;
  const grid=document.getElementById('vp-grid');
  grid.innerHTML='';
  items.forEach(it=>{
    const card=document.createElement('div');card.className='vp-card tremble-hover';
    const img=mkImg(it.id,it.tag);
    const name=document.createElement('div');name.className='vc-name';name.textContent=it.name;
    const idEl=document.createElement('div');idEl.className='vc-id';idEl.textContent=`#${pad4(it.id)}`;
    const fb=document.createElement('div');fb.className='vp-card-fallback';fb.textContent=it.name;fb.style.display='none';
    img.onerror=()=>{img.style.display='none';fb.style.display='flex';};
    card.append(img,name,idEl,fb);
    card.onclick=()=>playMotion(card, it.actions[0]||verb, ()=>openDetail(it,'verb',verb));
    grid.appendChild(card);
  });
  setPage('verb',verb);
}

function openDetail(it,from,fromVerb){
  history.push({page:'detail',item:it,from,fromVerb});

  const imgSide=document.getElementById('dp-img-side');
  imgSide.innerHTML='';
  const img=mkImg(it.id,it.tag);
  img.style.cssText='width:100%;height:100%;object-fit:cover;display:block;';
  const fb=document.createElement('div');fb.className='dp-img-fallback';fb.textContent=it.name;fb.style.display='none';
  img.onerror=()=>{img.style.display='none';fb.style.display='flex';};
  imgSide.append(img,fb);

  const infoSide=document.getElementById('dp-info-side');
  const actTags=it.actions.map(a=>`<span class="dp-tag-val action" data-verb="${a}">${a}</span>`).join('');
  infoSide.innerHTML=`
    <div>
      <div class="dp-num">#${pad4(it.id)}</div>
      <div class="dp-name">${it.name}</div>
      <div class="dp-tags">
        <div class="dp-tag-row"><div class="dp-tag-key">동작</div><div class="dp-tag-vals">${actTags}</div></div>
        <div class="dp-tag-row"><div class="dp-tag-key">분야</div><div class="dp-tag-vals"><span class="dp-tag-val">${it.field}</span></div></div>
        <div class="dp-tag-row"><div class="dp-tag-key">원리</div><div class="dp-tag-vals"><span class="dp-tag-val">${it.mechanism}</span></div></div>
      </div>
    </div>
    <a class="dp-lookup" href="https://www.google.com/search?q=${encodeURIComponent(it.name)}" target="_blank" rel="noopener">LOOK UP</a>`;

  infoSide.querySelectorAll('.dp-tag-val.action').forEach(tag=>{
    tag.onclick=()=>openVerbPage(tag.dataset.verb);
  });

  const rel=ALL_ITEMS.filter(o=>o.id!==it.id && o.actions && o.actions.some(a=>it.actions.includes(a))).slice(0,14);
  const relScroll=document.getElementById('dp-rel-scroll');
  relScroll.innerHTML='';
  rel.forEach(r=>{
    const ri=document.createElement('div');ri.className='dp-rel-item';
    const rimg=mkImg(r.id,r.tag);
    const rn=document.createElement('div');rn.className='dri-name';rn.textContent=r.name;
    rimg.onerror=function(){this.style.opacity=0.25;this.onerror=null;};
    ri.append(rimg,rn);
    ri.onclick=()=>openDetail(r,from,fromVerb);
    relScroll.appendChild(ri);
  });

  setPage('detail');
}

function setPage(name,verb){
  const wipe = document.getElementById('red-wipe');
  const doSwitch = () => {
    document.getElementById('home').style.display=name==='home'?'flex':'none';
    document.getElementById('verb-page').style.display=name==='verb'?'block':'none';
    document.getElementById('detail-page').style.display=name==='detail'?'block':'none';
    document.getElementById('back-btn').classList.toggle('hidden',name==='home');
    currentMode = (name==='verb'||name==='detail') ? 'verb' : 'home';
    const bc=document.getElementById('breadcrumb');
    if(name==='home'){bc.textContent='';document.getElementById('nav-hint').textContent='click a verb to expand · 72 items';}
    else if(name==='verb'){bc.innerHTML=`HOME / <span>${verb}</span>`;document.getElementById('nav-hint').textContent='click an item';}
    else{bc.innerHTML=`HOME / <span>DETAIL</span>`;document.getElementById('nav-hint').textContent='';}
    if(name!=='home') window.scrollTo(0,0);
    applyGradient(currentMode, 0);
    const activeEl = name==='home' ? document.getElementById('home')
      : name==='verb' ? document.getElementById('verb-page')
      : document.getElementById('detail-page');
    activeEl.classList.remove('page-enter');
    requestAnimationFrame(()=>activeEl.classList.add('page-enter'));
  };

  // 동사 페이지로 진입할 때만 빨간 와이프를 과감하게 사용
  if(name==='verb'){
    wipe.classList.remove('firing');
    void wipe.offsetWidth;
    wipe.classList.add('firing');
    setTimeout(doSwitch, 225); // 화면이 빨강으로 다 덮인 시점에 내용 교체
    setTimeout(()=>wipe.classList.remove('firing'), 520);
  } else {
    doSwitch();
  }
}

function goHome(){history=[{page:'home'}];setPage('home');renderHome();}
function goBack(){
  history.pop();
  const prev=history[history.length-1];
  if(!prev||prev.page==='home'){goHome();return;}
  if(prev.page==='verb'){openVerbPage(prev.verb,true);}
  else if(prev.page==='detail'){openDetail(prev.item,prev.from,prev.fromVerb);history.pop();}
}
document.addEventListener('keydown',e=>{if(e.key==='Escape')goBack();});

// ===== INTRO: 클릭(동작)이 쌓일수록 검정에서 빨강으로. 가득 차면 홈으로 =====
(function initIntro(){
  const intro = document.getElementById('intro');
  const hint = document.getElementById('intro-hint');
  const count = document.getElementById('intro-count');
  const REQUIRED = 12; // 필요한 클릭 수
  let presses = 0;

  // 가운데에서 빨강 원이 커지며 화면을 가득 채움 (동작이 쌓여 색이 된다)
  function update(){
    const t = presses / REQUIRED; // 0~1
    const redR = 2 + t * 90; // 처음부터 보이도록 최소 2%, 클릭마다 커짐
    intro.style.backgroundImage = `radial-gradient(circle closest-side at 50% 50%,
      var(--red) 0%, var(--red) ${redR}%,
      var(--bg) ${redR}%, var(--bg) 100%)`;
    count.textContent = `${presses} / ${REQUIRED}`;
    hint.style.opacity = presses===0 ? 1 : Math.max(0, 1-t*1.4);
  }
  update();

  intro.addEventListener('click', ()=>{
    if(presses >= REQUIRED) return;
    presses++;
    intro.classList.add('pressed');
    setTimeout(()=>intro.classList.remove('pressed'), 150);
    update();
    if(presses >= REQUIRED){
      intro.classList.add('firing');
      setTimeout(()=>{
        intro.style.display='none';
        document.getElementById('main-nav').style.display='flex';
        renderHome();
      }, 650);
    }
  });
})();

// ===== 배경 그라데이션: 스크롤을 따라 파랑·빨강 띠가 쭉 늘어남 (빨강이 파랑의 2배 길이) =====
let currentMode = 'home';

function applyGradient(mode, ratio){
  const t = Math.max(0, Math.min(1, ratio));
  const body = document.body;

  if(mode === 'home'){
    // 파랑(nav 아래에서 시작) → 빨강(중간) → 검정(끝)으로 부드럽게 섞임.
    const redPoint = 20 + t*20;     // 빨강이 절정에 도달하는 지점(%)
    const bgPoint = redPoint * 2.2; // 검정으로 완전히 가라앉는 지점
    body.style.backgroundImage = `linear-gradient(to bottom,
      var(--blue) 8%,
      var(--red) ${redPoint}%,
      var(--bg) ${bgPoint}%,
      var(--bg) 100%)`;
  } else {
    // 동사/상세 페이지: 검정(시작) → 파랑 → 빨강(메인, 화면 대부분을 부드럽게 채움)
    const bluePoint = Math.max(2, 5 - t*3);
    const redPoint = bluePoint + 6 + t*15;
    body.style.backgroundImage = `linear-gradient(to bottom,
      var(--bg) 0%,
      var(--blue) ${bluePoint}%,
      var(--red) ${redPoint}%,
      var(--red) 100%)`;
  }
}
applyGradient('home', 0);

(function initGradientScroll(){
  // 동사/상세 페이지: 일반 세로 스크롤
  window.addEventListener('scroll', ()=>{
    if(currentMode !== 'verb') return;
    const max = document.documentElement.scrollHeight - window.innerHeight;
    applyGradient('verb', max > 0 ? window.scrollY / max : 0);
  }, { passive: true });

  // 홈 화면: 가로 스크롤 비율을 그라데이션 확장에 매핑
  function bindHomeScroll(){
    const home = document.getElementById('home');
    if(!home) return;
    home.addEventListener('scroll', ()=>{
      if(currentMode !== 'home') return;
      const max = home.scrollWidth - home.clientWidth;
      applyGradient('home', max > 0 ? home.scrollLeft / max : 0);
    }, { passive: true });
  }
  const homeObserver = new MutationObserver(()=>{
    if(document.getElementById('home').children.length){
      bindHomeScroll();
      homeObserver.disconnect();
    }
  });
  homeObserver.observe(document.getElementById('home'), {childList:true});
})();
</script>
